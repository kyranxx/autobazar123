version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:15"
      timezone: "Europe/Bratislava"
    open-pull-requests-limit: 6
    versioning-strategy: "increase-if-necessary"
    labels:
      - "dependencies"
      - "security"
    groups:
      npm-production-patch:
        dependency-type: "production"
        update-types:
          - "patch"
      npm-development-patch:
        dependency-type: "development"
        update-types:
          - "patch"
      npm-production-minor:
        dependency-type: "production"
        update-types:
          - "minor"
      npm-development-minor:
        dependency-type: "development"
        update-types:
          - "minor"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:45"
      timezone: "Europe/Bratislava"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "security"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
