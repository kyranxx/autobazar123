name: Performance Budget Gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "public/**"
      - "tests/webapp-audit.ts"
      - "scripts/performance-budget-gate.mjs"
      - "scripts/performance-budget-gate.test.mjs"
      - "config/performance-budget-policy.json"
      - "playwright.config.ts"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/performance-budget-gate.yml"
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: performance-budget-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  performance-budget-dependabot-pr-note:
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip Dependabot PR preflight
        run: echo "Performance preflight is skipped for Dependabot PRs to reduce CI noise."

  performance-budget-preflight:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate budget gate script tests
        run: npm run test:performance-budget-gate-script

  performance-budget-gate:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 40
    env:
      QUALITY_ALERT_WEBHOOK_URL: ${{ secrets.QUALITY_ALERT_WEBHOOK_URL }}
      QUALITY_ALERT_WEBHOOK_SECRET: ${{ secrets.QUALITY_ALERT_WEBHOOK_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: https://example.com
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-test-service-role-key
      NEXT_PUBLIC_SUPPRESS_ALGOLIA_MISSING_KEYS_WARNING: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate budget gate script tests
        run: npm run test:performance-budget-gate-script

      - name: Generate webapp audit artifact
        env:
          WEBAPP_AUDIT_ALLOW_FAILURES: "false"
          PLAYWRIGHT_REUSE_SERVER: "false"
        run: npm run audit:webapp

      - name: Upload webapp audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webapp-audit-report
          path: output/playwright/webapp-audit.json
          if-no-files-found: error

      - name: Enforce performance budgets
        run: npm run check:performance-budgets

      - name: Request GitHub OIDC token for quality alert webhook
        if: always() && github.event_name == 'schedule' && env.QUALITY_ALERT_WEBHOOK_URL != ''
        id: oidc-token
        env:
          OIDC_AUDIENCE: autobazar123-quality-gates
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "GitHub OIDC request context is unavailable."
            exit 1
          fi

          OIDC_RESPONSE="$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}")"
          OIDC_TOKEN="$(printf '%s' "$OIDC_RESPONSE" | python3 -c 'import json,sys;print(json.load(sys.stdin).get("value",""))')"
          if [ -z "$OIDC_TOKEN" ]; then
            echo "OIDC token response did not include a token value."
            exit 1
          fi

          echo "::add-mask::$OIDC_TOKEN"
          echo "token=$OIDC_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Send nightly quality alert event
        if: always() && github.event_name == 'schedule' && env.QUALITY_ALERT_WEBHOOK_URL != '' && (steps.oidc-token.outputs.token != '' || env.QUALITY_ALERT_WEBHOOK_SECRET != '')
        continue-on-error: true
        env:
          QUALITY_ALERT_OIDC_TOKEN: ${{ steps.oidc-token.outputs.token }}
        run: |
          TIMESTAMP_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REQUEST_HEADERS=("-H" "Content-Type: application/json")
          if [ -n "$QUALITY_ALERT_OIDC_TOKEN" ]; then
            REQUEST_HEADERS+=("-H" "Authorization: Bearer $QUALITY_ALERT_OIDC_TOKEN")
          fi
          if [ -n "$QUALITY_ALERT_WEBHOOK_SECRET" ]; then
            REQUEST_HEADERS+=("-H" "x-monitoring-secret: $QUALITY_ALERT_WEBHOOK_SECRET")
          fi

          curl -fsSL -X POST "$QUALITY_ALERT_WEBHOOK_URL" \
            "${REQUEST_HEADERS[@]}" \
            -d "$(cat <<JSON
          {
            "repository": "${{ github.repository }}",
            "workflowFile": "performance-budget-gate.yml",
            "branch": "${{ github.ref_name }}",
            "eventName": "${{ github.event_name }}",
            "runId": ${{ github.run_id }},
            "runAttempt": ${{ github.run_attempt }},
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "status": "${{ job.status }}",
            "conclusion": "${{ job.status }}",
            "sha": "${{ github.sha }}",
            "startedAt": "${{ github.run_started_at }}",
            "completedAt": "$TIMESTAMP_UTC"
          }
          JSON
          )"
