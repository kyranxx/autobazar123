name: Performance Budget Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  performance-budget-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      QUALITY_ALERT_WEBHOOK_URL: ${{ secrets.QUALITY_ALERT_WEBHOOK_URL }}
      QUALITY_ALERT_WEBHOOK_SECRET: ${{ secrets.QUALITY_ALERT_WEBHOOK_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: https://example.com
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-test-service-role-key
      NEXT_PUBLIC_SUPPRESS_ALGOLIA_MISSING_KEYS_WARNING: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate budget gate script tests
        run: npm run test:performance-budget-gate-script

      - name: Generate webapp audit artifact
        env:
          WEBAPP_AUDIT_ALLOW_FAILURES: "false"
          PLAYWRIGHT_REUSE_SERVER: "false"
        run: npm run audit:webapp

      - name: Upload webapp audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webapp-audit-report
          path: output/playwright/webapp-audit.json
          if-no-files-found: error

      - name: Enforce performance budgets
        run: npm run check:performance-budgets

      - name: Send nightly quality alert event
        if: always() && github.event_name == 'schedule' && env.QUALITY_ALERT_WEBHOOK_URL != '' && env.QUALITY_ALERT_WEBHOOK_SECRET != ''
        continue-on-error: true
        run: |
          TIMESTAMP_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          curl -fsSL -X POST "$QUALITY_ALERT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-monitoring-secret: $QUALITY_ALERT_WEBHOOK_SECRET" \
            -d "$(cat <<JSON
          {
            "repository": "${{ github.repository }}",
            "workflowFile": "performance-budget-gate.yml",
            "branch": "${{ github.ref_name }}",
            "eventName": "${{ github.event_name }}",
            "runId": ${{ github.run_id }},
            "runAttempt": ${{ github.run_attempt }},
            "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "status": "${{ job.status }}",
            "conclusion": "${{ job.status }}",
            "sha": "${{ github.sha }}",
            "startedAt": "${{ github.run_started_at }}",
            "completedAt": "$TIMESTAMP_UTC"
          }
          JSON
          )"
