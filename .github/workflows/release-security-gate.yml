name: Release Security Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-security-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Slovak diacritics
        run: npm run check:sk-diacritics

      - name: Validate theme guard
        run: npm run check:theme-guard

      - name: Run security release gate
        run: npm run test:security:release-gate

      - name: Validate agent contract
        run: npm run test:agent-contract

      - name: Validate skill graph
        run: npm run test:skill-graph
