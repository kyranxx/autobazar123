name: Release Security Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  security-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Slovak diacritics
        run: npm run check:sk-diacritics

      - name: Run security release gate
        run: npm run test:security:release-gate

      - name: Validate agent contract
        run: npm run test:agent-contract

      - name: Validate skill graph
        run: npm run test:skill-graph
