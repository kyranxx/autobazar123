name: CodeQL

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "15 3 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  preflight:
    name: CodeQL Availability Preflight
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.probe.outputs.enabled }}
    steps:
      - id: probe
        name: Check Code Scanning Availability
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.request(
                "GET /repos/{owner}/{repo}/code-scanning/alerts",
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 1
                }
              );
              core.setOutput("enabled", "true");
              core.info("Code scanning API is available for this repository.");
            } catch (error) {
              const status = error?.status || error?.response?.status;
              if (status === 403 || status === 404) {
                core.warning(
                  `Skipping CodeQL analysis because code scanning is unavailable (status ${status}).`,
                );
                core.setOutput("enabled", "false");
              } else {
                throw error;
              }
            }

  analyze:
    name: Analyze (javascript-typescript)
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
