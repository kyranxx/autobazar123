name: OWASP ZAP Baseline

on:
  schedule:
    - cron: "45 3 * * 1"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional target URL override (falls back to ZAP_TARGET_URL secret)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve target URL
        id: resolve-target
        shell: bash
        env:
          INPUT_TARGET_URL: ${{ github.event.inputs.target_url }}
          SECRET_TARGET_URL: ${{ secrets.ZAP_TARGET_URL }}
        run: |
          TARGET_URL="${INPUT_TARGET_URL:-$SECRET_TARGET_URL}"
          if [ -z "$TARGET_URL" ]; then
            echo "ZAP target URL is missing."
            echo "Set ZAP_TARGET_URL secret or pass workflow_dispatch input target_url."
            exit 1
          fi

          echo "target_url=$TARGET_URL" >> "$GITHUB_OUTPUT"

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.resolve-target.outputs.target_url }}
          cmd_options: "-a"
