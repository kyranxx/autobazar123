name: Production Postdeploy Smoke

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: production-postdeploy-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke script
        shell: bash
        env:
          ALGOLIA_SYNC_SECRET: ${{ secrets.ALGOLIA_SYNC_SECRET }}
          PRODUCTION_SMOKE_URL: ${{ vars.PRODUCTION_SMOKE_URL }}
        run: |
          set -euo pipefail

          PRODUCTION_SMOKE_URL="${PRODUCTION_SMOKE_URL:-https://www.autobazar123.sk}"
          export TEST_URL="$PRODUCTION_SMOKE_URL"

          HEALTH_URL="${PRODUCTION_SMOKE_URL%/}/api/health"
          echo "Waiting for ${HEALTH_URL}"
          for attempt in {1..20}; do
            HEALTH_RESPONSE="$(curl -fsSL --max-time 10 "$HEALTH_URL")" && \
            HEALTH_STATUS="$(printf '%s' "$HEALTH_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')" || \
            HEALTH_STATUS=""

            if [[ "$HEALTH_STATUS" == "healthy" ]]; then
              echo "Health endpoint is healthy."
              break
            fi

            if [[ "$attempt" -eq 20 ]]; then
              echo "::error::Production health endpoint did not become healthy in time."
              if [[ -n "${HEALTH_RESPONSE:-}" ]]; then
                echo "::error::Last health payload: ${HEALTH_RESPONSE}"
              fi
              exit 1
            fi

            echo "Attempt ${attempt}/20: waiting for deployment to become healthy..."
            sleep 15
          done

          if npm run test:smoke; then
            true
          else
            echo "Primary production smoke failed; retrying once."
            sleep 20

            if npm run test:smoke; then
              true
            else
              echo "::error::Production smoke failed twice at ${PRODUCTION_SMOKE_URL}. Manual investigation or rollback is required."
              exit 1
            fi
          fi

          if [[ -n "${ALGOLIA_SYNC_SECRET:-}" ]]; then
            echo "Reconciling Algolia production settings and records."
            curl -fsSL -X POST "${PRODUCTION_SMOKE_URL%/}/api/algolia/sync" \
              -H "Authorization: Bearer ${ALGOLIA_SYNC_SECRET}" \
              -H "Content-Type: application/json"
          else
            echo "ALGOLIA_SYNC_SECRET is not configured in GitHub secrets; skipping postdeploy Algolia reconciliation."
          fi
