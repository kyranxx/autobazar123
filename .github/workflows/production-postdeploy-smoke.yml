name: Production Postdeploy Smoke

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: production-postdeploy-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke rollback script
        shell: bash
        env:
          ALGOLIA_SYNC_SECRET: ${{ secrets.ALGOLIA_SYNC_SECRET }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PRODUCTION_SMOKE_URL: ${{ vars.PRODUCTION_SMOKE_URL }}
        run: |
          set -euo pipefail

          PRODUCTION_SMOKE_URL="${PRODUCTION_SMOKE_URL:-https://autobazar123.sk}"
          export TEST_URL="$PRODUCTION_SMOKE_URL"

          LAST_SUBJECT="$(git log -1 --pretty=%s)"
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${LAST_SUBJECT}" == revert\(ci\):\ auto-rollback* ]]; then
            echo "Skipping postdeploy smoke for auto-rollback commit."
            exit 0
          fi

          HEALTH_URL="${PRODUCTION_SMOKE_URL%/}/api/health"
          echo "Waiting for ${HEALTH_URL}"
          for attempt in {1..20}; do
            HEALTH_RESPONSE="$(curl -fsS --max-time 10 "$HEALTH_URL")" && \
            HEALTH_STATUS="$(printf '%s' "$HEALTH_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status",""))')" || \
            HEALTH_STATUS=""

            if [[ "$HEALTH_STATUS" == "healthy" ]]; then
              echo "Health endpoint is healthy."
              break
            fi

            if [[ "$attempt" -eq 20 ]]; then
              echo "::error::Production health endpoint did not become healthy in time."
              if [[ -n "${HEALTH_RESPONSE:-}" ]]; then
                echo "::error::Last health payload: ${HEALTH_RESPONSE}"
              fi
              exit 1
            fi

            echo "Attempt ${attempt}/20: waiting for deployment to become healthy..."
            sleep 15
          done

          if npm run test:smoke; then
            true
          else
            echo "Primary production smoke failed; retrying once."
            sleep 20

            if npm run test:smoke; then
              true
            elif [[ "${GITHUB_EVENT_NAME}" != "push" ]]; then
              echo "::error::Production smoke failed on non-push run."
              exit 1
            else
              echo "Production smoke failed twice; auto-reverting ${GITHUB_SHA}."
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

              PARENT_COUNT="$(git rev-list --parents -n 1 "$GITHUB_SHA" | awk '{print NF-1}')"
              if [[ "${PARENT_COUNT}" -gt 1 ]]; then
                git revert --mainline 1 --no-edit "$GITHUB_SHA"
              else
                git revert --no-edit "$GITHUB_SHA"
              fi

              git commit --amend -m "revert(ci): auto-rollback ${GITHUB_SHA}" -m "Production smoke tests failed at ${PRODUCTION_SMOKE_URL}."
              git push origin "HEAD:${GITHUB_REF_NAME}"

              echo "::error::Production smoke checks failed and rollback commit was pushed."
              exit 1
            fi
          fi

          if [[ -n "${ALGOLIA_SYNC_SECRET:-}" ]]; then
            echo "Reconciling Algolia production settings and records."
            curl -fsSL -X POST "${PRODUCTION_SMOKE_URL%/}/api/algolia/sync" \
              -H "Authorization: Bearer ${ALGOLIA_SYNC_SECRET}" \
              -H "Content-Type: application/json"
          else
            echo "ALGOLIA_SYNC_SECRET is not configured in GitHub secrets; skipping postdeploy Algolia reconciliation."
          fi
