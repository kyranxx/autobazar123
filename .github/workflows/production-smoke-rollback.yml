name: Production Smoke Rollback

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: production-smoke-rollback-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PRODUCTION_SMOKE_URL: ${{ vars.PRODUCTION_SMOKE_URL || 'https://autobazar123.sk' }}
      TEST_URL: ${{ vars.PRODUCTION_SMOKE_URL || 'https://autobazar123.sk' }}
    steps:
      - name: Skip rollback smoke cycle for auto-revert commits
        if: ${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback') }}
        run: |
          echo "Skipping production smoke rollback workflow for auto-revert commit."
          exit 0

      - name: Checkout
        if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback') }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback') }}
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback') }}
        run: npm ci

      - name: Wait for production health endpoint
        id: wait-health
        if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback') }}
        continue-on-error: true
        shell: bash
        run: |
          HEALTH_URL="${PRODUCTION_SMOKE_URL%/}/api/health"
          echo "Waiting for ${HEALTH_URL}"
          for attempt in {1..20}; do
            if curl -fsS --max-time 10 "$HEALTH_URL" >/dev/null; then
              echo "Health endpoint is reachable."
              exit 0
            fi
            echo "Attempt ${attempt}/20: waiting for deployment to become reachable..."
            sleep 15
          done
          echo "::error::Production health endpoint did not become reachable in time."
          exit 1

      - name: Run production smoke test
        id: smoke-primary
        if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback') }}
        continue-on-error: true
        run: npm run test:smoke

      - name: Retry production smoke test once
        id: smoke-retry
        if: ${{ (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback')) && steps.smoke-primary.outcome == 'failure' }}
        continue-on-error: true
        run: |
          sleep 20
          npm run test:smoke

      - name: Auto-revert failed deployment commit
        if: ${{ github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback') && steps.smoke-primary.outcome == 'failure' && (steps.smoke-retry.outcome == 'failure' || steps.smoke-retry.outcome == '') }}
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PARENT_COUNT="$(git rev-list --parents -n 1 "$GITHUB_SHA" | awk '{print NF-1}')"
          if [ "${PARENT_COUNT}" -gt 1 ]; then
            git revert --mainline 1 --no-edit "$GITHUB_SHA"
          else
            git revert --no-edit "$GITHUB_SHA"
          fi

          git commit --amend -m "revert(ci): auto-rollback ${GITHUB_SHA}" -m "Production smoke tests failed at ${PRODUCTION_SMOKE_URL}."
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Fail workflow when smoke checks fail
        if: ${{ (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'revert(ci): auto-rollback')) && steps.smoke-primary.outcome == 'failure' && (steps.smoke-retry.outcome == 'failure' || steps.smoke-retry.outcome == '') }}
        run: |
          echo "Production smoke checks failed and rollback commit was pushed."
          exit 1
