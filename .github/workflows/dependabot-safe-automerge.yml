name: Dependabot Safe Auto-Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: dependabot-safe-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-safe-automerge:
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Read Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pullRequestId = context.payload.pull_request.node_id;
            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }`,
                { pullRequestId },
              );
              core.info(`Auto-merge enabled for PR #${context.payload.pull_request.number}.`);
            } catch (error) {
              core.warning(`Unable to enable auto-merge: ${error.message}`);
            }

      - name: Skip non-patch dependency update
        if: steps.metadata.outputs.update-type != 'version-update:semver-patch'
        run: |
          echo "Skipping auto-merge for update type: ${{ steps.metadata.outputs.update-type }}"
