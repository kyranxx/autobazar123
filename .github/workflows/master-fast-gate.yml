name: Master Fast Gate

on:
  push:
    branches:
      - master
      - main

concurrency:
  group: master-fast-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit
