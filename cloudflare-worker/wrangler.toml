# Cloudflare Worker for Autobazar123 Cron Jobs
name = "autobazar123-cron"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Cron triggers - runs daily at 6 AM (adjust as needed)
[[triggers]]
crons = ["0 6 * * *"]

# Environment variables (set via: npx wrangler secret put CRON_SECRET)
[vars]
# SITE_URL and CRON_SECRET will be set via CLI or dashboard
